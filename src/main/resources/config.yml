# If enabled, the plugin will attempt to hook into Vault.
# Having this disabled may disable some features in other plugins.
vault: true

# Enables an economy for testing stuff. Every player will have infinite money.
# Requires a server restart when changed.
enable-testing-economy: false

# Configure whether custom event are fired
custom-events:
  # PlayerMoveChunkEvent
  move-chunk: true
  # PlayerMoveBlockEvent
  move-block: true